{% extends "base.html" %}
{% block title %}Add Item - RentDao{% endblock %}
{% block content %}
<div class="container" style="max-width: 580px;">
    <div class="section-card" style="border-left: 5px solid #28a745;">
        <h2>➕ Add a New Rental Item</h2>
        <form action="/items" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="name">Item Name</label>
                <input type="text" id="name" name="name" required placeholder="Enter item name">
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <input type="text" id="description" name="description" required placeholder="Enter item description">
            </div>
            <div class="form-group">
                <label for="price_per_day">Price Per Day (BDT)</label>
                <input type="number" id="price_per_day" name="price_per_day" required placeholder="e.g. 500">
            </div>
            <div class="form-group">
                <label for="discount">Discount Percentage (%) <span style="color:#aaa; font-weight:400;">(optional)</span></label>
                <input type="number" id="discount" name="discount" value="0" placeholder="e.g. 10">
            </div>
            <div class="form-group">
                <label for="tags">Tags <span style="color:#aaa; font-weight:400;">(optional, comma-separated)</span></label>
                <input type="text" id="tags" name="tags" placeholder="e.g. vintage, portable, new">
                <small style="color: #888; display: block; margin-top: 5px;">Separate multiple tags with commas.</small>
            </div>
            <div class="form-group">
                <label for="pictures">Upload Pictures <span style="color:#aaa; font-weight:400;">(optional)</span></label>
                <input type="file" id="pictures" name="pictures" accept="image/*" multiple>
                <small style="color: #888; display: block; margin-top: 5px;">Hold CTRL/CMD to select multiple.</small>
            </div>
            <button type="submit" class="btn btn-green" style="padding: 10px 22px;">Add Item</button>
        </form>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Driver Registration - RentDao{% endblock %}
{% block content %}
<div class="container" style="max-width: 520px;">
    <div class="section-card" style="border-left: 5px solid #28a745;">
        <h2>🚚 Become a RentDao Driver</h2>
        {% if error %}
        <div class="message message-error">⚠️ {{ error }}</div>
        {% endif %}
        <form action="/driver/register" method="POST">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Create a password">
            </div>
            <div class="form-group">
                <label for="phone_no">Phone Number</label>
                <input type="text" id="phone_no" name="phone_no" required placeholder="Enter your phone number">
            </div>
            <div class="form-group">
                <label for="license">Driver's License Number</label>
                <input type="text" id="license" name="license" required placeholder="Enter your license number">
            </div>
            <div class="form-group">
                <label for="vehicle_type">Vehicle Type</label>
                <select id="vehicle_type" name="vehicle_type" required>
                    <option value="Motorcycle">Motorcycle</option>
                    <option value="Car">Car</option>
                    <option value="Van/Truck">Van / Truck</option>
                    <option value="Bicycle">Bicycle</option>
                </select>
            </div>
            <button type="submit" class="btn btn-green" style="width: 100%; padding: 10px;">Submit Application</button>
        </form>
        <p style="margin-top: 18px; font-size: 0.88em; color: #888; text-align: center;">
            Already have a driver account? <a href="/driver/login" style="color: #007bff;">Log in here</a>.
        </p>
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - RentDao</title>
    <style>
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; max-width: 400px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        .links { margin-top: 20px; font-size: 0.9em; }
    </style>
</head>
<body>

    <h1>Create your RentDao Account</h1>

    <form action="/register" method="POST">
        
        <div class="form-group">
            <label>Email Address:</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Full Name:</label>
            <input type="text" name="name" required>
        </div>
        
        <div class="form-group">
            <label>Password:</label>
            <input type="password" name="password" required>
        </div>

        <div class="form-group">
            <label>Location:</label>
            <input type="text" name="location" required>
        </div>

        <div class="form-group">
            <label>Phone Number:</label>
            <input type="text" name="phone_no" required>
        </div>

        <div class="form-group">
            <label>Profile Picture URL (Optional):</label>
            <input type="text" name="picture">
        </div>

        <div class="form-group">
            <label>Preferred Payment Option:</label>
            <select name="payment_option">
                <option value="Card">Card</option>
                <option value="Cash On Delivery">Cash On Delivery</option>
            </select>
        </div>
        
        <button type="submit">Sign Up</button>
    </form>

    <div class="links">
        <p>Already have an account? <a href="/login">Log in here</a>.</p>
    </div>

</body>
</html>

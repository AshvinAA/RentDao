{% extends "base.html" %}
{% block title %}Report User - RentDao{% endblock %}
{% block content %}
<div class="container" style="max-width: 560px;">
    <div class="section-card" style="border-left: 5px solid #dc3545;">
        <h2>🚩 Report a User</h2>
        <form action="/reports/create" method="post">
            <input type="hidden" name="reported_user_id" value="{{ reported_user_id }}">
            <input type="hidden" name="item_id" value="{{ item_id }}">
            <div class="form-group">
                <label for="reason">Reason</label>
                <select name="reason" id="reason" required>
                    <option value="spam">Spam</option>
                    <option value="harassment">Harassment</option>
                    <option value="fraud">Fraud</option>
                    <option value="inappropriate_content">Inappropriate Content</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="details">Details <span style="color:#aaa; font-weight:400;">(optional)</span></label>
                <textarea name="details" id="details" rows="4" placeholder="Describe the issue..."></textarea>
            </div>
            <button type="submit" class="btn btn-red" style="padding: 10px 22px;">Submit Report</button>
        </form>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Driver Login - RentDao{% endblock %}
{% block content %}
<div class="container" style="max-width: 480px;">
    <div class="section-card" style="border-left: 5px solid #343a40;">
        <h2>🚚 Driver Login</h2>
        {% if error %}
        <div class="message message-error">⚠️ {{ error }}</div>
        {% endif %}
        <form action="/driver/login" method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="Enter your driver email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-dark" style="width: 100%; padding: 10px;">Log In to Dashboard</button>
        </form>
        <p style="margin-top: 18px; font-size: 0.88em; color: #888; text-align: center;">
            Not a driver yet? <a href="/driver/register" style="color: #007bff;">Apply to join our fleet</a>.
        </p>
        <p style="margin-top: 8px; font-size: 0.88em; color: #888; text-align: center;">
            Regular user? <a href="/login" style="color: #007bff;">Login here</a>.
        </p>
    </div>
</div>
{% endblock %}

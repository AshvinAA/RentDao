{% extends "base.html" %}
{% block title %}Driver Application — RentDao{% endblock %}
{% block content %}
<div class="container" style="max-width: 500px;">
    <div class="section-card">
        <h2>Driver Application</h2>
        {% if error %}
        <div class="message message-error">{{ error }}</div>
        {% endif %}
        <form action="/driver/register" method="POST">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Create a password">
            </div>
            <div class="form-group">
                <label for="phone_no">Phone Number</label>
                <input type="text" id="phone_no" name="phone_no" required placeholder="+1 555 000 0000">
            </div>
            <div class="form-group">
                <label for="license">Driver's License Number</label>
                <input type="text" id="license" name="license" required placeholder="e.g. DL-123456">
            </div>
            <div class="form-group">
                <label for="vehicle_type">Vehicle Type</label>
                <select id="vehicle_type" name="vehicle_type" required>
                    <option value="Motorcycle">Motorcycle</option>
                    <option value="Car">Car</option>
                    <option value="Van/Truck">Van / Truck</option>
                    <option value="Bicycle">Bicycle</option>
                </select>
            </div>
            <button type="submit" class="btn btn-blue" style="width: 100%; padding: 11px;">Submit Application</button>
        </form>
        <p style="margin-top: 20px; font-size: 0.875em; color: var(--c-text-3); text-align: center;">
            Already have a driver account? <a href="/driver/login" style="color: var(--c-primary); font-weight: 500;">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}

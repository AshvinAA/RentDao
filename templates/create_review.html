{% extends "base.html" %}
{% block title %}Leave a Review - RentDao{% endblock %}
{% block content %}
<div class="container" style="max-width: 580px;">
    <a href="/profile" class="back-link">← Back to Profile</a>
    <div class="section-card" style="border-left: 5px solid #28a745;">
        <h2>⭐ Leave a Review</h2>
        <p style="color:#888; font-size:0.88em; margin-top:-10px; margin-bottom:20px;">
            Booking #{{ booking.id }} — {{ booking.start_date }} to {{ booking.end_date }}
        </p>
        <form action="/reviews/create" method="post">
            <input type="hidden" name="booking_id" value="{{ booking.id }}">
            <div class="form-group">
                <label>Rating</label>
                <select name="rating" required>
                    <option value="">-- Select a rating --</option>
                    <option value="5">⭐⭐⭐⭐⭐ — Excellent</option>
                    <option value="4">⭐⭐⭐⭐ — Very Good</option>
                    <option value="3">⭐⭐⭐ — Good</option>
                    <option value="2">⭐⭐ — Fair</option>
                    <option value="1">⭐ — Poor</option>
                </select>
            </div>
            <div class="form-group">
                <label>Comment <span style="color:#aaa; font-weight:400;">(optional)</span></label>
                <textarea name="comment" rows="4" placeholder="Share your experience..."></textarea>
            </div>
            <button type="submit" class="btn btn-green" style="padding: 10px 22px;">Submit Review</button>
        </form>
    </div>
</div>
{% endblock %}

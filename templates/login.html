{% extends "base.html" %}
{% block title %}Login - RentDao{% endblock %}
{% block content %}
<div class="container" style="max-width: 480px;">
    <div class="section-card" style="border-left: 5px solid #007bff;">
        <h2>🔑 Welcome Back to RentDao</h2>
        {% if error %}
        <div class="message message-error">⚠️ {{ error }}</div>
        {% endif %}
        <form action="/login" method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-blue" style="width: 100%; padding: 10px;">Log In</button>
        </form>
        <p style="margin-top: 18px; font-size: 0.88em; color: #888; text-align: center;">
            Don't have an account? <a href="/register" style="color: #007bff;">Sign up here</a>.
        </p>
    </div>
</div>
{% endblock %}

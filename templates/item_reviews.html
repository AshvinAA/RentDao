<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Reviews for {{ item.name }} - RentDao{% endblock %}</title>
</head>
<body>
    {% extends "base.html" %}

    {% block content %}
    <div class="container">
        <h1>Reviews for {{ item.name }}</h1>
        {% if reviews %}
        <ul>
            {% for review in reviews %}
            <li>
                Rating: {{ review.rating }}/5 - Comment: {{ review.comment }} - By: {{ review.reviewer.email }}
            </li>
            {% endfor %}
        </ul>
        {% else %}
        <p>No reviews yet.</p>
        {% endif %}
    </div>
    {% endblock %}
</body>
</html>

{% extends "base.html" %}
{% block title %}Leave a Review - RentDao{% endblock %}
{% block content %}
<div class="container" style="max-width: 560px;">
    <div class="section-card" style="border-left: 5px solid #28a745;">
        <h2>⭐ Leave a Review</h2>
        <form action="/reviews/create" method="post">
            <div class="form-group">
                <label for="booking_id">Booking ID</label>
                <input type="number" name="booking_id" id="booking_id" required>
            </div>
            <div class="form-group">
                <label for="rating">Rating</label>
                <select name="rating" id="rating" required>
                    <option value="5">⭐⭐⭐⭐⭐ — Excellent</option>
                    <option value="4">⭐⭐⭐⭐ — Very Good</option>
                    <option value="3">⭐⭐⭐ — Good</option>
                    <option value="2">⭐⭐ — Fair</option>
                    <option value="1">⭐ — Poor</option>
                </select>
            </div>
            <div class="form-group">
                <label for="comment">Comment <span style="color:#aaa; font-weight:400;">(optional)</span></label>
                <textarea name="comment" id="comment" rows="4" placeholder="Share your experience..."></textarea>
            </div>
            <button type="submit" class="btn btn-green" style="padding:10px 22px;">Submit Review</button>
        </form>
    </div>
</div>
{% endblock %}

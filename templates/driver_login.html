{% extends "base.html" %}
{% block title %}Driver Sign In — RentDao{% endblock %}
{% block content %}
<div class="container" style="max-width: 460px;">
    <div class="section-card">
        <h2>Driver Sign In</h2>
        {% if error %}
        <div class="message message-error">{{ error }}</div>
        {% endif %}
        <form action="/driver/login" method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="Enter your driver email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-dark" style="width: 100%; padding: 11px;">Sign In to Dashboard</button>
        </form>
        <p style="margin-top: 20px; font-size: 0.875em; color: var(--c-text-3); text-align: center;">
            Not a driver yet? <a href="/driver/register" style="color: var(--c-primary); font-weight: 500;">Apply to join</a>
        </p>
        <p style="margin-top: 8px; font-size: 0.875em; color: var(--c-text-3); text-align: center;">
            Regular user? <a href="/login" style="color: var(--c-primary); font-weight: 500;">Sign in here</a>
        </p>
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html>
<body>
    <h2>Admin Login</h2>
    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}
    <form method="post" action="/admin/login">
        <input type="password" name="password" placeholder="Enter admin password" />
        <button type="submit">Login</button>
    </form>
</body>
</html>

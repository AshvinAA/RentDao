{% extends "base.html" %}
{% block title %}Welcome to RentDao{% endblock %}
{% block content %}
<div class="container">
    <div class="section-card" style="border-left: 5px solid #007bff; text-align: center; padding: 60px 40px;">
        <h1 style="font-size: 2.2em; color: #2c3e50; margin-bottom: 12px;">🏠 Welcome to RentDao</h1>
        <p style="color: #6c757d; font-size: 1.05em; margin-bottom: 35px; line-height: 1.6;">
            Your trusted platform for renting items and connecting with local communities in 2026.
        </p>
        <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
            <a href="/items" class="btn btn-blue" style="font-size: 0.95em; padding: 10px 22px;">🛒 Browse Items</a>
            {% if user_email %}
            <a href="/profile" class="btn btn-gray" style="font-size: 0.95em; padding: 10px 22px;">👤 My Profile</a>
            {% endif %}
            <a href="/register" class="btn btn-green" style="font-size: 0.95em; padding: 10px 22px;">✨ Join RentDao</a>
        </div>
    </div>
</div>
{% endblock %}
